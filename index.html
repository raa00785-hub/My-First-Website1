<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Challenge</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --surface: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #4f46e5;
        --accent-soft: #e0e7ff;
        --success: #10b981;
        --danger: #ef4444;
        --border: #d1d5db;
      }

      body.dark {
        color-scheme: dark;
        --bg: #0f172a;
        --surface: #111827;
        --text: #f9fafb;
        --muted: #cbd5e1;
        --accent: #818cf8;
        --accent-soft: #312e81;
        --success: #34d399;
        --danger: #f87171;
        --border: #334155;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, var(--bg), #e2e8f0);
        color: var(--text);
        min-height: 100vh;
        transition: background 0.25s ease, color 0.25s ease;
      }

      body.dark {
        background: linear-gradient(135deg, var(--bg), #1e293b);
      }

      .app {
        max-width: 860px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: 0 12px 36px rgba(15, 23, 42, 0.12);
        padding: 24px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
        flex-wrap: wrap;
      }

      .title {
        margin: 0;
        font-size: clamp(1.4rem, 2.2vw, 1.9rem);
      }

      .topbar .controls {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      button,
      input {
        font: inherit;
      }

      .icon-btn,
      .primary-btn,
      .secondary-btn {
        border: none;
        border-radius: 999px;
        cursor: pointer;
        transition: transform 0.2s ease, opacity 0.2s ease;
      }

      .icon-btn:hover,
      .primary-btn:hover,
      .secondary-btn:hover {
        transform: translateY(-1px);
      }

      .icon-btn {
        background: var(--accent-soft);
        color: var(--accent);
        padding: 9px 12px;
      }

      .primary-btn {
        background: var(--accent);
        color: white;
        padding: 10px 18px;
      }

      .secondary-btn {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
        padding: 10px 16px;
      }

      .name-input {
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        padding: 8px 12px;
        border-radius: 999px;
        min-width: 180px;
      }

      .status-line {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        gap: 12px;
        flex-wrap: wrap;
      }

      .timer-pill {
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-weight: 700;
      }

      .progress-wrap {
        margin: 12px 0 20px;
      }

      .progress-label {
        display: flex;
        justify-content: space-between;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .progress-bar {
        height: 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        overflow: hidden;
      }

      .progress-fill {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--success));
        transition: width 0.3s ease;
      }

      .question-block {
        margin-top: 18px;
      }

      .question-title {
        font-size: clamp(1.15rem, 2vw, 1.4rem);
        margin-bottom: 16px;
      }

      .options {
        display: grid;
        gap: 12px;
      }

      .option-btn {
        text-align: left;
        width: 100%;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        padding: 12px 14px;
        border-radius: 12px;
        cursor: pointer;
      }

      .option-btn:hover {
        border-color: var(--accent);
      }

      .option-btn.correct {
        background: rgba(16, 185, 129, 0.16);
        border-color: var(--success);
      }

      .option-btn.wrong {
        background: rgba(239, 68, 68, 0.16);
        border-color: var(--danger);
      }

      .feedback {
        margin-top: 14px;
        min-height: 22px;
        font-weight: 700;
        color: var(--accent);
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        margin-top: 18px;
        flex-wrap: wrap;
      }

      .actions button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .result-screen {
        display: none;
      }

      .result-score {
        font-size: 2.3rem;
        margin: 4px 0 10px;
        font-weight: 800;
      }

      .grade-badge {
        display: inline-block;
        margin-top: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-weight: 700;
      }

      .leaderboard {
        margin-top: 24px;
        border-top: 1px solid var(--border);
        padding-top: 16px;
      }

      .leaderboard ul {
        list-style: none;
        padding: 0;
        margin: 10px 0 0;
        display: grid;
        gap: 8px;
      }

      .leaderboard li {
        display: flex;
        justify-content: space-between;
        background: rgba(79, 70, 229, 0.08);
        padding: 10px 12px;
        border-radius: 10px;
      }

      .confetti-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 50;
      }

      .confetti-piece {
        position: absolute;
        top: -10vh;
        width: 10px;
        height: 18px;
        opacity: 0.9;
        animation: confetti-fall 2.4s linear forwards;
      }

      @keyframes confetti-fall {
        to {
          transform: translate3d(var(--x), 110vh, 0) rotate(720deg);
          opacity: 0;
        }
      }

      @media (max-width: 700px) {
        .app {
          padding: 14px 10px 36px;
        }

        .card {
          padding: 16px;
        }

        .name-input {
          min-width: 0;
          width: 100%;
        }

        .topbar {
          align-items: stretch;
        }

        .controls {
          width: 100%;
        }

        .controls .name-input {
          flex: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="confetti-layer" id="confetti-layer"></div>
    <main class="app">
      <section class="card">
        <div class="topbar">
          <h1 class="title">⚡ Quick Quiz Challenge</h1>
          <div class="controls">
            <input id="player-name" class="name-input" type="text" maxlength="20" placeholder="Enter your name" />
            <button id="theme-toggle" class="icon-btn" type="button">🌙</button>
          </div>
        </div>

        <div class="status-line">
          <div class="timer-pill">⏱️ <span id="timer">15</span>s</div>
          <div id="score">Score: 0/10</div>
        </div>

        <div class="progress-wrap">
          <div class="progress-label">
            <span>Progress</span>
            <span id="progress-text">1 / 10</span>
          </div>
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
        </div>

        <div id="quiz-block" class="question-block">
          <h2 id="question" class="question-title"></h2>
          <div id="options" class="options"></div>
          <div id="feedback" class="feedback"></div>
          <div class="actions">
            <button id="next-btn" class="primary-btn" type="button" disabled>Next Question</button>
          </div>
        </div>

        <div id="result-screen" class="result-screen">
          <h2>Quiz Complete!</h2>
          <div id="result-score" class="result-score"></div>
          <div id="result-percentage"></div>
          <div id="grade-badge" class="grade-badge"></div>
          <div class="actions">
            <button id="play-again" class="primary-btn" type="button">Play Again</button>
          </div>
          <div class="leaderboard">
            <h3>Local Leaderboard</h3>
            <ul id="leaderboard-list"></ul>
          </div>
        </div>
      </section>
    </main>

    <script>
      const questions = [
        {
          question: 'What does HTML stand for?',
          options: ['Hyper Text Markup Language', 'High Transfer Machine Language', 'Hyperlink Text Manager Language', 'Home Tool Markup Language'],
          answer: 0
        },
        {
          question: 'Which language runs in the browser?',
          options: ['Python', 'Java', 'JavaScript', 'C++'],
          answer: 2
        },
        {
          question: 'What does CSS control?',
          options: ['Database logic', 'Page styling', 'Server responses', 'Hardware access'],
          answer: 1
        },
        {
          question: 'Which planet is known as the Red Planet?',
          options: ['Venus', 'Mars', 'Mercury', 'Jupiter'],
          answer: 1
        },
        {
          question: 'How many continents are there?',
          options: ['5', '6', '7', '8'],
          answer: 2
        },
        {
          question: 'What is the largest mammal?',
          options: ['Elephant', 'Blue whale', 'Giraffe', 'Hippopotamus'],
          answer: 1
        },
        {
          question: 'Which company created React?',
          options: ['Google', 'Microsoft', 'Facebook', 'Amazon'],
          answer: 2
        },
        {
          question: 'What is 2 + 2 × 2?',
          options: ['4', '6', '8', '10'],
          answer: 1
        },
        {
          question: 'What does CPU stand for?',
          options: ['Central Processing Unit', 'Computer Program Utility', 'Central Power Unit', 'Core Processing Utility'],
          answer: 0
        },
        {
          question: 'Which ocean is the largest?',
          options: ['Atlantic Ocean', 'Indian Ocean', 'Arctic Ocean', 'Pacific Ocean'],
          answer: 3
        }
      ];

      const questionEl = document.getElementById('question');
      const optionsEl = document.getElementById('options');
      const feedbackEl = document.getElementById('feedback');
      const progressFill = document.getElementById('progress-fill');
      const progressText = document.getElementById('progress-text');
      const scoreEl = document.getElementById('score');
      const timerEl = document.getElementById('timer');
      const nextBtn = document.getElementById('next-btn');
      const quizBlock = document.getElementById('quiz-block');
      const resultScreen = document.getElementById('result-screen');
      const resultScore = document.getElementById('result-score');
      const resultPercentage = document.getElementById('result-percentage');
      const gradeBadge = document.getElementById('grade-badge');
      const playAgainBtn = document.getElementById('play-again');
      const themeToggle = document.getElementById('theme-toggle');
      const playerNameInput = document.getElementById('player-name');
      const leaderboardList = document.getElementById('leaderboard-list');
      const confettiLayer = document.getElementById('confetti-layer');

      let currentQuestionIndex = 0;
      let score = 0;
      let timeLeft = 15;
      let timerId = null;
      let answered = false;
      let leaderboard = JSON.parse(localStorage.getItem('quizLeaderboard') || '[]');
      let selectedTheme = localStorage.getItem('quizTheme') || 'light';

      function applyTheme(theme) {
        document.body.classList.toggle('dark', theme === 'dark');
        themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
      }

      function playTone(type) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();
        oscillator.connect(gain);
        gain.connect(ctx.destination);

        const now = ctx.currentTime;
        if (type === 'correct') {
          oscillator.type = 'sine';
          oscillator.frequency.setValueAtTime(880, now);
          oscillator.frequency.exponentialRampToValueAtTime(1320, now + 0.15);
          gain.gain.setValueAtTime(0.08, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        } else if (type === 'wrong') {
          oscillator.type = 'square';
          oscillator.frequency.setValueAtTime(220, now);
          oscillator.frequency.exponentialRampToValueAtTime(160, now + 0.15);
          gain.gain.setValueAtTime(0.08, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        } else {
          oscillator.type = 'triangle';
          oscillator.frequency.setValueAtTime(660, now);
          oscillator.frequency.exponentialRampToValueAtTime(520, now + 0.18);
          gain.gain.setValueAtTime(0.05, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        }

        oscillator.start(now);
        oscillator.stop(now + 0.23);
        setTimeout(() => ctx.close(), 250);
      }

      function updateTimer() {
        timerEl.textContent = timeLeft;
        if (timeLeft <= 5) {
          timerEl.parentElement.style.background = 'rgba(239, 68, 68, 0.15)';
          timerEl.parentElement.style.color = 'var(--danger)';
        } else {
          timerEl.parentElement.style.background = 'var(--accent-soft)';
          timerEl.parentElement.style.color = 'var(--accent)';
        }
      }

      function startTimer() {
        clearInterval(timerId);
        timeLeft = 15;
        answered = false;
        updateTimer();
        nextBtn.disabled = true;
        feedbackEl.textContent = '';

        timerId = setInterval(() => {
          timeLeft -= 1;
          updateTimer();
          if (timeLeft <= 0) {
            clearInterval(timerId);
            handleTimeout();
          }
        }, 1000);
      }

      function renderQuestion() {
        const q = questions[currentQuestionIndex];
        questionEl.textContent = `${currentQuestionIndex + 1}. ${q.question}`;
        optionsEl.innerHTML = '';
        progressFill.style.width = `${((currentQuestionIndex + 1) / questions.length) * 100}%`;
        progressText.textContent = `${currentQuestionIndex + 1} / ${questions.length}`;
        scoreEl.textContent = `Score: ${score}/${questions.length}`;

        q.options.forEach((option, index) => {
          const button = document.createElement('button');
          button.className = 'option-btn';
          button.textContent = option;
          button.addEventListener('click', () => handleAnswer(index));
          optionsEl.appendChild(button);
        });

        quizBlock.style.display = 'block';
        resultScreen.style.display = 'none';
        startTimer();
      }

      function handleAnswer(selectedIndex) {
        if (answered) return;
        answered = true;
        clearInterval(timerId);

        const q = questions[currentQuestionIndex];
        const buttons = Array.from(optionsEl.querySelectorAll('.option-btn'));

        buttons.forEach((button, index) => {
          button.disabled = true;
          if (index === q.answer) {
            button.classList.add('correct');
          }
          if (index === selectedIndex && index !== q.answer) {
            button.classList.add('wrong');
          }
        });

        if (selectedIndex === q.answer) {
          score += 1;
          scoreEl.textContent = `Score: ${score}/${questions.length}`;
          feedbackEl.textContent = 'Correct!';
          playTone('correct');
        } else {
          feedbackEl.textContent = `Not quite. The correct answer is: ${q.options[q.answer]}`;
          playTone('wrong');
        }

        nextBtn.disabled = false;
      }

      function handleTimeout() {
        if (answered) return;
        answered = true;
        const q = questions[currentQuestionIndex];
        const buttons = Array.from(optionsEl.querySelectorAll('.option-btn'));
        buttons.forEach((button, index) => {
          button.disabled = true;
          if (index === q.answer) {
            button.classList.add('correct');
          }
        });
        feedbackEl.textContent = `Time's up! The correct answer was: ${q.options[q.answer]}`;
        playTone('wrong');
        nextBtn.disabled = false;
        setTimeout(() => {
          goToNextQuestion();
        }, 1000);
      }

      function goToNextQuestion() {
        if (currentQuestionIndex < questions.length - 1) {
          currentQuestionIndex += 1;
          renderQuestion();
        } else {
          finishQuiz();
        }
      }

      function finishQuiz() {
        clearInterval(timerId);
        quizBlock.style.display = 'none';
        resultScreen.style.display = 'block';

        const percentage = Math.round((score / questions.length) * 100);
        let grade = 'B';
        if (percentage >= 90) grade = 'A';
        else if (percentage >= 80) grade = 'B';
        else if (percentage >= 70) grade = 'C';
        else if (percentage >= 60) grade = 'D';
        else grade = 'F';

        resultScore.textContent = `${score} / ${questions.length}`;
        resultPercentage.textContent = `Percentage: ${percentage}%`;
        gradeBadge.textContent = `Grade: ${grade}`;

        const playerName = playerNameInput.value.trim() || 'Anonymous';
        leaderboard = [...leaderboard, { name: playerName, score, percentage, grade }]
          .sort((a, b) => b.percentage - a.percentage || b.score - a.score)
          .slice(0, 5);
        localStorage.setItem('quizLeaderboard', JSON.stringify(leaderboard));
        renderLeaderboard();

        if (percentage > 80) {
          launchConfetti(140);
          playTone('correct');
        } else {
          playTone('wrong');
        }
      }

      function renderLeaderboard() {
        leaderboardList.innerHTML = '';
        if (!leaderboard.length) {
          leaderboardList.innerHTML = '<li>No scores yet. Be the first!</li>';
          return;
        }

        leaderboard.forEach((entry, index) => {
          const li = document.createElement('li');
          li.innerHTML = `<span>#${index + 1} ${entry.name}</span><span>${entry.score}/${questions.length} · ${entry.percentage}%</span>`;
          leaderboardList.appendChild(li);
        });
      }

      function launchConfetti(count) {
        confettiLayer.innerHTML = '';
        for (let i = 0; i < count; i += 1) {
          const piece = document.createElement('div');
          piece.className = 'confetti-piece';
          const colors = ['#818cf8', '#34d399', '#f59e0b', '#f43f5e', '#ffffff'];
          piece.style.left = `${Math.random() * 100}%`;
          piece.style.background = colors[Math.floor(Math.random() * colors.length)];
          piece.style.setProperty('--x', `${(Math.random() - 0.5) * 220}px`);
          piece.style.animationDelay = `${Math.random() * 0.2}s`;
          confettiLayer.appendChild(piece);
        }
        setTimeout(() => {
          confettiLayer.innerHTML = '';
        }, 2500);
      }

      nextBtn.addEventListener('click', goToNextQuestion);
      playAgainBtn.addEventListener('click', () => {
        currentQuestionIndex = 0;
        score = 0;
        renderQuestion();
      });

      themeToggle.addEventListener('click', () => {
        selectedTheme = selectedTheme === 'dark' ? 'light' : 'dark';
        localStorage.setItem('quizTheme', selectedTheme);
        applyTheme(selectedTheme);
      });

      applyTheme(selectedTheme);
      renderLeaderboard();
      renderQuestion();
    </script>
  </body>
</html>
